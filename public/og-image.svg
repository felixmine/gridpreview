<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Backgrounds -->
    <radialGradient id="og-bg" cx="38%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0f1c30"/>
      <stop offset="100%" stop-color="#080c12"/>
    </radialGradient>
    <!-- Plate -->
    <linearGradient id="og-plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2e48"/>
      <stop offset="100%" stop-color="#0f1b2a"/>
    </linearGradient>
    <!-- Amber bin top -->
    <linearGradient id="og-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Blue bin top -->
    <linearGradient id="og-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Green bin top -->
    <linearGradient id="og-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <!-- Red bin top -->
    <linearGradient id="og-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="og-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="screen"/>
    </filter>
    <!-- Soft glow for text area -->
    <radialGradient id="og-text-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a6a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a3a6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Subtle dot-grid texture -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#1e3252" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ═══════════════════════════════════════════════
       ISOMETRIC GRID — 3×3 base, 5 bins
       P(c,r,h) = (310 + 55c - 55r,  200 + 27c + 27r - 44h)
       ═══════════════════════════════════════════════ -->

  <!-- Plate grid (3×3) outer corners:
       (0,0)=(310,200)  (3,0)=(475,281)
       (0,3)=(145,281)  (3,3)=(310,362)            -->

  <!-- Plate depth — right face -->
  <polygon points="475,281 310,362 310,372 475,291" fill="#080c14"/>
  <!-- Plate depth — left face -->
  <polygon points="145,281 310,362 310,372 145,291" fill="#0c1320"/>

  <!-- Plate top -->
  <polygon points="310,200 475,281 310,362 145,281" fill="url(#og-plate)"/>

  <!-- Grid lines on plate (col and row dividers) -->
  <!-- Col 1: (365,227)→(200,308)  Col 2: (420,254)→(255,335) -->
  <line x1="365" y1="227" x2="200" y2="308" stroke="#1d3358" stroke-width="1.2"/>
  <line x1="420" y1="254" x2="255" y2="335" stroke="#1d3358" stroke-width="1.2"/>
  <!-- Row 1: (200,227)→(365,308)  Row 2: (255,254)→(420,335) -->
  <line x1="200" y1="227" x2="365" y2="308" stroke="#1d3358" stroke-width="1.2"/>
  <line x1="255" y1="254" x2="420" y2="335" stroke="#1d3358" stroke-width="1.2"/>
  <!-- Plate rim -->
  <polygon points="310,200 475,281 310,362 145,281" fill="none" stroke="#21375c" stroke-width="1.2"/>

  <!-- ── BIN at (0,1) h=3 — AMBER ── -->
  <!-- P(0,1,h): (310-55, 200+27-44h) = (255, 227-44h)
       (1,1): (310, 254-44h)   (1,2): (255, 281-44h)   (0,2): (200, 254-44h) -->
  <!-- h=0: (255,227)(310,254)(255,281)(200,254)
       h=3: (255,95)(310,122)(255,149)(200,122) -->
  <polygon points="200,254 255,281 255,149 200,122" fill="#78350f"/>
  <polygon points="310,254 255,281 255,149 310,122" fill="#b45309"/>
  <polygon points="255,95 310,122 255,149 200,122" fill="url(#og-amber)" filter="url(#og-glow)"/>
  <polygon points="255,95 310,122 255,149 200,122" fill="none" stroke="#fef9c3" stroke-width="1" opacity="0.4"/>

  <!-- ── BIN at (2,0) h=4 — BLUE ── -->
  <!-- P(2,0): (310+110, 200+54) = (420,254)
       (3,0): (475,281)  (3,1): (420,308)  (2,1): (365,281) -->
  <!-- h=0: (420,254)(475,281)(420,308)(365,281)
       h=4: (420,78)(475,105)(420,132)(365,105) -->
  <polygon points="365,281 420,308 420,132 365,105" fill="#1e3a8a"/>
  <polygon points="475,281 420,308 420,132 475,105" fill="#2563eb"/>
  <polygon points="420,78 475,105 420,132 365,105" fill="url(#og-blue)" filter="url(#og-glow)"/>
  <polygon points="420,78 475,105 420,132 365,105" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/>

  <!-- ── BIN at (1,2) h=2 — GREEN ── -->
  <!-- P(1,2): (310+55-110, 200+27+54) = (255,281)
       (2,2): (310,308)  (2,3): (255,335)  (1,3): (200,308) -->
  <!-- h=2: (255,193)(310,220)(255,247)(200,220) -->
  <polygon points="200,308 255,335 255,247 200,220" fill="#065f46"/>
  <polygon points="310,308 255,335 255,247 310,220" fill="#059669"/>
  <polygon points="255,193 310,220 255,247 200,220" fill="url(#og-green)" filter="url(#og-glow)"/>
  <polygon points="255,193 310,220 255,247 200,220" fill="none" stroke="#d1fae5" stroke-width="1" opacity="0.4"/>

  <!-- ── BIN at (0,0) h=2 — faint/dark (background bin) ── -->
  <!-- P(0,0): (310,200)  (1,0): (365,227)  (1,1): (310,254)  (0,1): (255,227) -->
  <!-- h=2: (310,112)(365,139)(310,166)(255,139) -->
  <polygon points="255,227 310,254 310,166 255,139" fill="#101e32"/>
  <polygon points="365,227 310,254 310,166 365,139" fill="#152540"/>
  <polygon points="310,112 365,139 310,166 255,139" fill="#1a2e4a"/>
  <polygon points="310,112 365,139 310,166 255,139" fill="none" stroke="#1e3252" stroke-width="0.8"/>

  <!-- ── BIN at (2,2) h=3 — RED ── -->
  <!-- P(2,2): (310+110-110, 200+54+54) = (310,308)
       (3,2): (365,335)  (3,3): (310,362)  (2,3): (255,335) -->
  <!-- h=3: (310,176)(365,203)(310,230)(255,203) -->
  <polygon points="255,335 310,362 310,230 255,203" fill="#7f1d1d"/>
  <polygon points="365,335 310,362 310,230 365,203" fill="#b91c1c"/>
  <polygon points="310,176 365,203 310,230 255,203" fill="url(#og-red)" filter="url(#og-glow)"/>
  <polygon points="310,176 365,203 310,230 255,203" fill="none" stroke="#fee2e2" stroke-width="1" opacity="0.35"/>

  <!-- ══════════════════════════════════════════
       TEXT — right half, vertically centred
       ══════════════════════════════════════════ -->

  <!-- Soft glow behind text -->
  <ellipse cx="840" cy="315" rx="320" ry="220" fill="url(#og-text-glow)"/>

  <!-- Brand name — two-tone -->
  <text
    x="600" y="272"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="800"
    letter-spacing="-2"
    fill="#ffffff"
  >Gridfinity</text>
  <text
    x="600" y="378"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="800"
    letter-spacing="-2"
    fill="#4f8cff"
  >Preview</text>

  <!-- Tagline -->
  <text
    x="600" y="430"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="0.5"
    fill="#6b8cb5"
  >Arrange your 3D prints — right in the browser</text>

  <!-- Divider accent line -->
  <line x1="600" y1="450" x2="870" y2="450" stroke="#4f8cff" stroke-width="2" opacity="0.35"/>

  <!-- URL -->
  <text
    x="600" y="490"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    fill="#2a4a7a"
    letter-spacing="1"
  >gridpreview.app</text>
</svg>
